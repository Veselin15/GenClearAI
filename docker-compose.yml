name: genclear

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [frontend]
    depends_on:
      - api
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:8000
    expose:
      - "3000"
    networks: [frontend]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - scratch:/data
    networks: [frontend, backend]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
    volumes:
      - scratch:/data
    networks: [backend]
    tmpfs:
      - /tmp
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 4g
    cpus: "3.5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-genclear}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-genclear-secret}
    volumes:
      - minio_data:/data
    networks: [backend]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genclear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genclear}
      POSTGRES_DB: ${POSTGRES_DB:-genclear}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genclear}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [backend]

networks:
  frontend:
  backend:
    internal: true

volumes:
  scratch:
  minio_data:
  pgdata:
  caddy_data:
  caddy_config:
