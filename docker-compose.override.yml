# Auto-loaded by `docker compose up` for local development.
# Hot-reloads frontend (and API) when you edit files on the host.
# Production deploy: docker compose -f docker-compose.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    environment:
      INTERNAL_API_URL: http://api:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    healthcheck:
      start_period: 45s

  api:
    volumes:
      - ./app:/srv/app
      - ./scripts:/srv/scripts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  web_node_modules:
